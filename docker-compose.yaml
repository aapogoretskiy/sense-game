version: '3.8'

services:
  app:
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sense-game-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sensegame
      - SPRING_DATASOURCE_USERNAME=sense_username
      - SPRING_DATASOURCE_PASSWORD=sense_password
    depends_on:
      - db
    networks:
      - monitoring_network
    volumes:
      - ./logs:/sense-game/logs
    restart: always

  db:
    image: postgres:latest
    container_name: sense-game-db
    environment:
      POSTGRES_USER: sense_username
      POSTGRES_PASSWORD: sense_password
      POSTGRES_DB: sensegame
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - monitoring_network
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring_network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring_network
    restart: always

  elasticsearch:
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.5"
    image: docker.io/bitnami/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/bitnami/elasticsearch/data
    networks:
      - monitoring_network
    restart: always

  logstash:
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    image: docker.io/bitnami/logstash:8.10.2
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash.conf:/bitnami/logstash/pipeline/logstash.conf
      - ./logs:/sense-game/logs
    depends_on:
      - elasticsearch
    networks:
      - monitoring_network
    restart: always

  kibana:
    image: docker.io/bitnami/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    volumes:
      - kibana-data:/bitnami/kibana
    depends_on:
      - elasticsearch
    networks:
      - monitoring_network
    restart: always

volumes:
  db-data:
  grafana-data:
  elasticsearch-data:
  kibana-data:

networks:
  monitoring_network:
