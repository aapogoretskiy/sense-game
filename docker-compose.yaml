version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sense-game-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sensegame
      - SPRING_DATASOURCE_USERNAME=sense_username
      - SPRING_DATASOURCE_PASSWORD=sense_password
    depends_on:
      - db
    networks:
      - monitoring_network

  db:
    image: postgres:latest
    container_name: sense-game-db
    environment:
      POSTGRES_USER: sense_username
      POSTGRES_PASSWORD: sense_password
      POSTGRES_DB: sensegame
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - monitoring_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring_network

volumes:
  db-data:
  grafana-data:

networks:
  monitoring_network:
